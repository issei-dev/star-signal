<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スターシグナル | バトル</title>
  <link rel="stylesheet" href="battle.css">
</head>
<body>
  <div id="battle-screen">
    <div id="battle-bg"></div>

    <header class="battle-topbar">
      <div>
        <div class="small-label">TURN</div>
        <div id="turn-indicator" class="big-value">1</div>
      </div>
      <div class="enemy-summary">
        <div id="enemy-name" class="enemy-name">敵</div>
        <div class="hp-bar enemy-hp"><span id="enemy-hp-fill"></span></div>
        <div id="enemy-hp-text" class="hp-text"></div>
      </div>
      <div>
        <div class="small-label">PHASE</div>
        <div id="phase-indicator" class="big-value">PLAYER</div>
      </div>
    </header>

    <section class="battle-main">
      <div id="enemy-panel" class="enemy-panel"></div>
      <div id="party-panel" class="party-panel"></div>
    </section>

    <section class="command-panel">
      <div class="current-actor-box">
        <div class="small-label">現在の行動キャラ</div>
        <div id="current-actor-name" class="current-actor-name">-</div>
        <div id="current-actor-state" class="current-actor-state">スキルは何度でも使用可能 / 攻撃または防御で行動終了</div>
      </div>

      <div class="command-buttons">
        <button id="btn-attack">通常攻撃</button>
        <button id="btn-skill">スキル</button>
        <button id="btn-defense" class="secondary">防御</button>
        <button id="btn-special" class="accent">必殺技発動</button>
      </div>

      <div id="skill-panel" class="skill-panel"></div>
    </section>

    <section class="log-panel">
      <div class="small-label">BATTLE LOG</div>
      <div id="battle-log" class="battle-log"></div>
    </section>
  </div>

  <div id="result-overlay" class="result-overlay hidden">
    <div class="result-card">
      <div id="result-title" class="result-title">VICTORY</div>
      <div id="result-text" class="result-text"></div>
      <div class="result-buttons">
        <button id="btn-return-story">ストーリーへ戻る</button>
        <button id="btn-retry" class="secondary">もう一度挑戦</button>
      </div>
    </div>
  </div>

  <script src="battle.js"></script>
</body>
</html>
