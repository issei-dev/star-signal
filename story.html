<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ストーリー</title>
  <link rel="stylesheet" href="story.css">
</head>
<body>

<div id="story-screen">
  <div id="story-bg"></div>

  <div id="story-characters"></div>

  <div id="story-ui">
    <div id="story-chapter"></div>
    <div id="story-title"></div>

    <div id="story-name"></div>
    <div id="story-text"></div>

    <div class="story-buttons">
      <button id="story-prev">戻る</button>
      <button id="story-next">次へ</button>
      <button id="story-skip">スキップ</button>
    </div>
  </div>
</div>

<button id="start-story" class="start-btn">▶ ストーリー開始</button>

<script src="app.js"></script>
</body>
</html>
